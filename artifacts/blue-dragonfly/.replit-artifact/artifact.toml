kind = "web"
previewPath = "/"
title = "Blue Dragonfly Health & Wellness"
version = "1.0.0"
id = "artifacts/blue-dragonfly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22680

[services.development]
run = "pnpm --filter @workspace/blue-dragonfly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blue-dragonfly", "run", "build" ]
publicDir = "artifacts/blue-dragonfly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22680"
BASE_PATH = "/"
